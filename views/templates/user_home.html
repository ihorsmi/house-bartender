{{define "user_home.html"}}
<section>
  {{$partialPath := "/partials/user/cocktails"}}
  <header class="flex flex-col md:flex-row md:items-end justify-between mb-10 gap-6">
    <div class="space-y-2">
      <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-secondary">Collections</span>
      <h1 class="text-5xl md:text-6xl font-extrabold tracking-tighter leading-none text-primary">The Library</h1>
      <p class="text-secondary text-sm max-w-xl">Browse the live menu, filter by base spirit, and use the top search to find a drink faster.</p>
    </div>

    <div class="flex items-center gap-2 overflow-x-auto pb-2 no-scrollbar">
      <a class="{{if eq .Page.Spirit ""}}bg-primary text-on-primary{{else}}bg-surface-container-low text-secondary hover:bg-surface-container-high{{end}} px-4 py-2 text-[11px] font-bold uppercase tracking-wider rounded-lg transition-colors" href="{{libraryURL .Path .Page.Search "" 1}}" data-hx-get="{{libraryURL $partialPath .Page.Search "" 1}}" data-hx-target="#libraryResults" data-hx-swap="innerHTML" data-hx-push-url="{{libraryURL .Path .Page.Search "" 1}}">All Spirits</a>
      <a class="{{if eq .Page.Spirit "whiskey"}}bg-primary text-on-primary{{else}}bg-surface-container-low text-secondary hover:bg-surface-container-high{{end}} px-4 py-2 text-[11px] font-bold uppercase tracking-wider rounded-lg transition-colors" href="{{libraryURL .Path .Page.Search "whiskey" 1}}" data-hx-get="{{libraryURL $partialPath .Page.Search "whiskey" 1}}" data-hx-target="#libraryResults" data-hx-swap="innerHTML" data-hx-push-url="{{libraryURL .Path .Page.Search "whiskey" 1}}">Whiskey</a>
      <a class="{{if eq .Page.Spirit "gin"}}bg-primary text-on-primary{{else}}bg-surface-container-low text-secondary hover:bg-surface-container-high{{end}} px-4 py-2 text-[11px] font-bold uppercase tracking-wider rounded-lg transition-colors" href="{{libraryURL .Path .Page.Search "gin" 1}}" data-hx-get="{{libraryURL $partialPath .Page.Search "gin" 1}}" data-hx-target="#libraryResults" data-hx-swap="innerHTML" data-hx-push-url="{{libraryURL .Path .Page.Search "gin" 1}}">Gin</a>
      <a class="{{if eq .Page.Spirit "tequila"}}bg-primary text-on-primary{{else}}bg-surface-container-low text-secondary hover:bg-surface-container-high{{end}} px-4 py-2 text-[11px] font-bold uppercase tracking-wider rounded-lg transition-colors" href="{{libraryURL .Path .Page.Search "tequila" 1}}" data-hx-get="{{libraryURL $partialPath .Page.Search "tequila" 1}}" data-hx-target="#libraryResults" data-hx-swap="innerHTML" data-hx-push-url="{{libraryURL .Path .Page.Search "tequila" 1}}">Tequila</a>
      <a class="{{if eq .Page.Spirit "rum"}}bg-primary text-on-primary{{else}}bg-surface-container-low text-secondary hover:bg-surface-container-high{{end}} px-4 py-2 text-[11px] font-bold uppercase tracking-wider rounded-lg transition-colors" href="{{libraryURL .Path .Page.Search "rum" 1}}" data-hx-get="{{libraryURL $partialPath .Page.Search "rum" 1}}" data-hx-target="#libraryResults" data-hx-swap="innerHTML" data-hx-push-url="{{libraryURL .Path .Page.Search "rum" 1}}">Rum</a>
    </div>
  </header>

  <div id="libraryResults">
    {{template "library_results.html" .}}
  </div>
</section>
{{end}}
