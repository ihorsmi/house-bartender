{{define "onboarding.html"}}
<section class="w-full px-6 py-12">
  <div class="mb-12 text-center">
    <h1 class="text-[1.25rem] font-semibold tracking-[0.2em] uppercase text-primary">House Bartender</h1>
    <p class="mt-6 text-[0.75rem] uppercase tracking-[0.14em] text-secondary">Initial Admin Provisioning</p>
  </div>

  <form method="post" action="/onboarding" class="space-y-8">
    <div>
      <label class="text-[0.6875rem] uppercase tracking-[0.1em] font-bold text-on-secondary-container mb-3 block" for="onboard-email">Email</label>
      <input class="w-full bg-transparent border-0 border-b border-outline-variant/30 px-0 py-2 text-[0.875rem] focus:border-primary focus:ring-0 focus:outline-none transition-all duration-300 rounded-none placeholder:text-on-tertiary-container/30" id="onboard-email" name="email" placeholder="owner@example.com" type="email" required>
    </div>

    <div>
      <label class="text-[0.6875rem] uppercase tracking-[0.1em] font-bold text-on-secondary-container mb-3 block" for="onboard-display-name">Display Name</label>
      <input class="w-full bg-transparent border-0 border-b border-outline-variant/30 px-0 py-2 text-[0.875rem] focus:border-primary focus:ring-0 focus:outline-none transition-all duration-300 rounded-none placeholder:text-on-tertiary-container/30" id="onboard-display-name" name="display_name" placeholder="Jordan" type="text" required>
    </div>

    <div>
      <label class="text-[0.6875rem] uppercase tracking-[0.1em] font-bold text-on-secondary-container mb-3 block" for="onboard-password">Password</label>
      <input class="w-full bg-transparent border-0 border-b border-outline-variant/30 px-0 py-2 text-[0.875rem] focus:border-primary focus:ring-0 focus:outline-none transition-all duration-300 rounded-none placeholder:text-on-tertiary-container/30" id="onboard-password" name="password" placeholder="At least 8 characters" type="password" minlength="8" required>
    </div>

    <div class="pt-8">
      <button class="w-full bg-primary text-on-primary py-4 text-[0.6875rem] uppercase tracking-[0.2em] font-bold hover:opacity-90 active:scale-[0.98] transition-all duration-200" type="submit">Create Admin</button>
    </div>
  </form>
</section>
{{end}}
