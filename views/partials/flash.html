{{define "flash.html"}}
{{if .Flashes}}
  <div class="fixed inset-x-0 top-4 z-[80] flex justify-center px-4" role="status" aria-live="polite">
    <div class="w-full max-w-[520px] space-y-3" data-flash-container>
    {{range .Flashes}}
      <div class="flex items-start gap-3 rounded-lg border px-4 py-3 shadow-sm backdrop-blur-xl {{if eq .Level "success"}}border-emerald-200 bg-emerald-50/95 text-emerald-800{{else if eq .Level "error"}}border-red-200 bg-red-50/95 text-red-800{{else}}border-black/10 bg-white/95 text-[#191a28]{{end}}" data-flash-item>
        <span class="material-symbols-outlined text-[18px] mt-0.5">{{if eq .Level "success"}}check_circle{{else if eq .Level "error"}}error{{else}}info{{end}}</span>
        <span class="text-sm font-medium leading-6 flex-1">{{.Message}}</span>
        <button class="shrink-0 rounded-full p-1 hover:bg-black/5 transition-colors" type="button" data-flash-dismiss aria-label="Dismiss notification" onclick="var item=this.closest('[data-flash-item]');if(item){var container=item.parentElement;item.remove();if(container&&container.children.length===0&&container.parentElement){container.parentElement.remove();}}">
          <span class="material-symbols-outlined text-[18px]">close</span>
        </button>
      </div>
    {{end}}
    </div>
  </div>
{{end}}
{{end}}
